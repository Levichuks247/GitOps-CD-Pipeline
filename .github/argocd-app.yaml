apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Levichuks247/GitOps-CD-Pipeline.git
    targetRevision: HEAD
    path: kubernetes-manifests # This is the folder ArgoCD will watch
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true